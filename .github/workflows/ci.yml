name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Validate instruments.csv
        run: |
          python <<'PY'
          import csv, sys
          expected_columns = ['symbol', 'company', 'exchange']
          with open('instruments.csv') as f:
              reader = csv.DictReader(f)
              if reader.fieldnames != expected_columns:
                  print(f'❌ Column mismatch:\n  expected: {expected_columns}\n  got: {reader.fieldnames}')
                  sys.exit(1)
              rows = list(reader)
              if len(rows) < 1000:
                  print(f'❌ Suspicious row count: {len(rows)} (expected ≥1000)')
                  sys.exit(1)
              symbols = [r['symbol'] for r in rows]
              if len(set(symbols)) != len(symbols):
                  print(f'❌ Duplicate symbols')
                  sys.exit(1)
              empty = [r for r in rows if not r['symbol'].strip()]
              if empty:
                  print(f'❌ {len(empty)} rows with empty symbol')
                  sys.exit(1)
              print(f'✓ {len(rows)} instruments, columns OK, symbols unique')
          PY
